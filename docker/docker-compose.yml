version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:password@db:3306/retail_forecaster
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MODEL_DIR=/app/models
      - DATASET_DIR=/app/datasets
    depends_on:
      - db
    volumes:
      - ./models:/app/models
      - ./datasets:/app/datasets
      - ./reports:/app/reports

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: retail_forecaster
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  mysql_data:
